<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Era Co. — Admin (Google Sheets)</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F0EDDC;
    --charcoal: #1B1B1D;
    --red: #D13B3B;
    --sand: #C9B9A1;
    --muted: #B8B2AA;
    --border: #3a3a3c;
    --card-bg: #222224;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--charcoal);
    color: var(--cream);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--cream);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .header-logo {
    display: block;
    max-height: 90px;
    width: 100%;
    object-fit: contain;
    object-position: center;
  }

  /* ── MAIN LAYOUT ── */
  .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

  .page-title {
    font-size: clamp(28px,4vw,52px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    line-height: 0.9;
    padding: 40px 0 8px;
  }
  .page-title span { color: var(--red); }
  .page-subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 12px 20px;
    border: none;
    background: none;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab.active {
    color: var(--cream);
    border-bottom-color: var(--red);
  }
  .tab:hover { color: var(--cream); }

  /* ── PANEL ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── FORM ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 768px) {
    .form-grid { grid-template-columns: 1fr; }
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .form-group.full { grid-column: 1 / -1; }
  label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }
  label .req { color: var(--red); margin-left: 2px; }
  input, select, textarea {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--cream);
    padding: 12px 16px;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    border-radius: 0;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--red);
  }
  select option { background: var(--card-bg); }
  textarea { resize: vertical; min-height: 100px; }

  /* ── IMAGE UPLOAD ── */
  .upload-area {
    border: 2px dashed var(--border);
    background: var(--card-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    cursor: pointer;
    transition: border-color 0.2s;
    position: relative;
    min-height: 200px;
    text-align: center;
  }
  .upload-area:hover { border-color: var(--red); }
  .upload-area input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .upload-area .upload-icon {
    font-size: 36px;
    margin-bottom: 12px;
    opacity: 0.4;
  }
  .upload-area .upload-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .upload-preview {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
    display: none;
  }
  .upload-preview.visible { display: block; }

  /* ── MULTI IMAGE GRID ── */
  .multi-upload-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  @media (max-width: 700px) {
    .multi-upload-grid { grid-template-columns: repeat(4, 1fr); }
  }
  .mini-upload {
    position: relative;
    aspect-ratio: 1;
    border: 1px dashed var(--border);
    background: var(--card-bg);
    cursor: pointer;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: var(--muted);
    transition: border-color 0.2s;
  }
  .mini-upload:hover { border-color: var(--red); }
  .mini-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .mini-upload img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
  .mini-upload img.visible { display: block; }
  .mini-del {
    position: absolute;
    top: 4px; right: 4px;
    background: var(--red);
    color: white;
    border: none;
    width: 20px; height: 20px;
    font-size: 12px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
  .mini-del.visible { display: flex; }

  /* ── BUTTONS ── */
  .btn-primary {
    background: var(--red);
    color: var(--cream);
    border: none;
    padding: 16px 32px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-outline {
    background: transparent;
    color: var(--cream);
    border: 1px solid var(--border);
    padding: 16px 32px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-outline:hover { border-color: var(--cream); }
  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    padding: 8px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-danger:hover { background: var(--red); color: white; }
  .btn-edit {
    background: transparent;
    color: var(--sand);
    border: 1px solid var(--sand);
    padding: 8px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-edit:hover { background: var(--sand); color: var(--charcoal); }

  .form-actions {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  /* ── CATALOG GRID ── */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .filter-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover {
    border-color: var(--red);
    color: var(--cream);
  }

  .catalog-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }

  .product-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .product-card:hover { border-color: var(--sand); }

  .card-img-wrap {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
    background: #2a2a2c;
  }
  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s;
  }
  .product-card:hover .card-img-wrap img { transform: scale(1.05); }
  .card-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: var(--red);
    color: white;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 8px;
  }
  .card-badge.sale { background: var(--sand); color: var(--charcoal); }
  .card-badge.new { background: var(--red); }
  .card-badge.coming-soon { background: #7B4AE2; color: #fff; }
  .card-badge.rare { background: #1B7B4A; color: #fff; }
  .card-coming-overlay {
    position: absolute; inset: 0;
    background: rgba(123,74,226,0.18);
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .card-coming-overlay span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: .2em;
    color: #fff; background: #7B4AE2;
    padding: 6px 16px; border-radius: 2px;
  }
  .card-sku {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(27,27,29,0.8);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    padding: 3px 6px;
    letter-spacing: 0.08em;
  }

  .card-body { padding: 16px; }
  .card-category {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 6px;
  }
  .card-name {
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
    line-height: 1.2;
  }
  .card-desc {
    font-family: 'Lora', serif;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-price-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .card-price {
    font-size: 16px;
    font-weight: 800;
    color: var(--cream);
  }
  .card-price-orig {
    font-size: 12px;
    color: var(--muted);
    text-decoration: line-through;
  }
  .card-stock {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .stock-in { color: #6fcf97; }
  .stock-low { color: #f2994a; }
  .stock-out { color: var(--red); }

  .card-actions {
    display: flex;
    gap: 8px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .card-shopee {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #EE4D2D;
    color: white;
    border: none;
    padding: 8px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    flex: 1;
    justify-content: center;
    transition: filter 0.2s;
  }
  .card-shopee:hover { filter: brightness(1.1); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--charcoal);
    border: 1px solid var(--border);
    max-width: 900px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 40px;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }
  .modal-title {
    font-size: 24px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.02em;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 24px;
    cursor: pointer;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--red); }

  /* ── DETAIL VIEW ── */
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }
  @media (max-width: 600px) { .detail-grid { grid-template-columns: 1fr; } }
  .detail-imgs {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .detail-main-img {
    aspect-ratio: 3/4;
    overflow: hidden;
    background: #2a2a2c;
  }
  .detail-main-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .detail-thumbs {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 6px;
  }
  .thumb {
    aspect-ratio: 1;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .thumb.active, .thumb:hover { border-color: var(--red); }
  .thumb img { width:100%; height:100%; object-fit: cover; }

  .detail-info { padding: 8px 0; }
  .detail-cat {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 8px;
  }
  .detail-name {
    font-size: clamp(22px,3vw,32px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    line-height: 0.95;
    margin-bottom: 4px;
  }
  .detail-sku {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .detail-price {
    font-size: 28px;
    font-weight: 800;
    color: var(--cream);
    margin-bottom: 4px;
  }
  .detail-price-orig {
    font-size: 14px;
    color: var(--muted);
    text-decoration: line-through;
    margin-bottom: 16px;
  }
  .detail-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }
  .detail-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .detail-desc {
    font-family: 'Lora', serif;
    font-size: 14px;
    color: var(--sand);
    line-height: 1.7;
    margin-bottom: 20px;
  }
  .detail-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .meta-item { display: flex; flex-direction: column; gap: 4px; }
  .meta-val {
    font-size: 13px;
    font-weight: 600;
    color: var(--cream);
  }
  .detail-shopee {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #EE4D2D;
    color: white;
    border: none;
    padding: 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    width: 100%;
    transition: filter 0.2s;
    margin-bottom: 10px;
  }
  .detail-shopee:hover { filter: brightness(1.1); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 80px 40px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state h3 {
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 8px;
    color: var(--cream);
    opacity: 0.5;
  }
  .empty-state p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--red);
    color: white;
    padding: 14px 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    z-index: 9999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: #27AE60; }

  /* ── SECTION HEADER ── */
  .section-hdr {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .catalog-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* ── CONDITION BADGE ── */
  .cond-badge {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid var(--border);
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── RATING STARS ── */
  .stars { color: #F2C94C; font-size: 13px; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="container">
  <h1 class="page-title">KATALOG <span>PRODUK</span></h1>
  <p class="page-subtitle">Second Era Co. &mdash; Admin Panel &bull; Kelola koleksi Anda</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('catalog')">&#9776; Katalog</button>
    <button class="tab" onclick="switchTab('add')">&#43; Tambah Produk</button>
  </div>

  <!-- CATALOG PANEL -->
  <div class="panel active" id="panel-catalog">
    <div class="section-hdr">
      <div class="filters" id="filterBtns"></div>
      <span class="catalog-count" id="catalogCount">0 produk</span>
    </div>
    <div class="catalog-grid" id="catalogGrid"></div>
  </div>

  <!-- ADD PRODUCT PANEL -->
  <div class="panel" id="panel-add">
    <div class="form-grid">

      <!-- Left: Images -->
      <div class="form-group">
        <label>Foto Utama <span class="req">*</span></label>
        <div class="upload-area" id="mainUploadArea">
          <input type="file" id="mainImg" accept="image/*" onchange="handleMainImg(this)">
          <div class="upload-icon">&#128247;</div>
          <div class="upload-text">Klik atau drag foto utama<br><small>JPG, PNG — maks 5MB</small></div>
          <img class="upload-preview" id="mainImgPreview">
        </div>
      </div>

      <!-- Right: Info -->
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="form-group">
          <label>Nama Produk <span class="req">*</span></label>
          <input type="text" id="prodName" placeholder="cth. Vintage Leather Jacket">
        </div>
        <div class="form-group">
          <label>Kode SKU <span class="req">*</span></label>
          <input type="text" id="prodSku" placeholder="cth. SEC-OW-001">
        </div>
        <div class="form-group">
          <label>Kategori <span class="req">*</span></label>
          <select id="prodCat">
            <option value="">— Pilih Kategori —</option>
            <option value="OUTERWEAR">Outerwear</option>
            <option value="DENIM">Denim</option>
            <option value="TOPS">Tops</option>
            <option value="ACCESSORIES">Accessories</option>
            <option value="FOOTWEAR">Footwear</option>
            <option value="SCENT">Scent</option>
            <option value="LAINNYA">Lainnya</option>
          </select>
        </div>
        <div class="form-group">
          <label>Kondisi</label>
          <select id="prodCondition">
            <option value="Baru">Baru</option>
            <option value="Second — Like New">Second — Like New</option>
            <option value="Second — Very Good">Second — Very Good</option>
            <option value="Second — Good">Second — Good</option>
          </select>
        </div>
      </div>

      <!-- Description full width -->
      <div class="form-group full">
        <label>Deskripsi Produk <span class="req">*</span></label>
        <textarea id="prodDesc" placeholder="Ceritakan detail produk: bahan, ukuran, kondisi, keunikan..."></textarea>
      </div>

      <!-- Price -->
      <div class="form-group">
        <label>Harga Jual <span class="req">*</span></label>
        <input type="text" id="prodPrice" placeholder="cth. 450000" oninput="formatPrice(this)">
      </div>
      <div class="form-group">
        <label>Harga Coret (opsional)</label>
        <input type="text" id="prodPriceOrig" placeholder="cth. 600000" oninput="formatPrice(this)">
      </div>

      <!-- Stock & Size -->
      <div class="form-group">
        <label>Stok</label>
        <input type="number" id="prodStock" placeholder="cth. 1" min="0">
      </div>
      <div class="form-group">
        <label>Ukuran / Size</label>
        <input type="text" id="prodSize" placeholder="cth. M / 52 / Free Size">
      </div>

      <!-- Berat & Brand asal -->
      <div class="form-group">
        <label>Berat Produk (gram)</label>
        <input type="number" id="prodWeight" placeholder="cth. 500">
      </div>
      <div class="form-group">
        <label>Dimensi (cm)</label>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:4px;">
          <input type="text" id="prodPanjang" placeholder="Panjang">
          <input type="text" id="prodLebar" placeholder="Lebar">
          <input type="text" id="prodTinggi" placeholder="Tinggi">
        </div>
        <small style="color:var(--muted);font-size:10px;margin-top:4px;display:block;">P &times; L &times; T &mdash; untuk kalkulasi ongkir</small>
      </div>
      <div class="form-group">
        <label>Brand / Merek Asal</label>
        <input type="text" id="prodBrand" placeholder="cth. Levi's, Ralph Lauren, dll.">
      </div>

      <!-- Material & Warna -->
      <div class="form-group">
        <label>Material / Bahan</label>
        <input type="text" id="prodMaterial" placeholder="cth. 100% Genuine Leather">
      </div>
      <div class="form-group">
        <label>Warna</label>
        <input type="text" id="prodColor" placeholder="cth. Tan Brown">
      </div>

      <!-- Status & Label -->
      <div class="form-group">
        <label>Status Produk</label>
        <select id="prodStatus">
          <option value="available">Tersedia</option>
          <option value="sold">Terjual</option>
          <option value="reserved">Reserved</option>
        </select>
      </div>
      <div class="form-group">
        <label>Label / Badge</label>
        <select id="prodBadge">
          <option value="">— Tanpa Label —</option>
          <option value="new">NEW</option>
          <option value="sale">SALE</option>
          <option value="rare">RARE FIND</option>
          <option value="featured">FEATURED</option>
          <option value="coming-soon">COMING SOON</option>
        </select>
      </div>

      <!-- Shopee link -->
      <div class="form-group full">
        <label>Link Shopee <span class="req">*</span></label>
        <input type="url" id="prodShopee" placeholder="https://shopee.co.id/...">
      </div>

      <!-- Catatan seller -->
      <div class="form-group full">
        <label>Catatan Seller (opsional)</label>
        <textarea id="prodNotes" placeholder="Info tambahan: cara perawatan, histori, detail lain..."></textarea>
      </div>

      <!-- Foto tambahan -->
      <div class="form-group full">
        <label>Foto Tambahan (maks. 7 foto)</label>
        <div class="multi-upload-grid" id="extraImgGrid"></div>
      </div>

    </div>

    <input type="hidden" id="editId">
    <div class="form-actions">
      <button class="btn-primary" onclick="saveProduct()">&#10003; Simpan Produk</button>
      <button class="btn-outline" onclick="resetForm()">&#10005; Reset</button>
    </div>
  </div>

</div><!-- /container -->

function showStatus(msg, type) {
  const el = document.getElementById('gs-status');
  if(!el) { console.log('[Status]', msg); return; }
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = type === 'error' ? '#D13B3B' : '#1B1B1D';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.display = 'none'; }, 3500);
}

function loadProducts() {
  if (!GS_URL) {
    // Fallback to localStorage if no GS URL configured
    try {
      const raw = localStorage.getItem('sec_era_products');
      if (raw) {
        const parsed = JSON.parse(raw);
        const localIds = new Set(parsed.map(p => p.sku));
        const missing = SEED_PRODUCTS.filter(p => !localIds.has(p.sku));
        products = [...parsed, ...missing];
      } else {
        products = [...SEED_PRODUCTS];
      }
    } catch(e) { products = [...SEED_PRODUCTS]; }
    buildFilters(); renderCatalog();
    return;
  }
  showStatus('⏳ Memuat data dari Google Sheets...', 'ok');
  fetch(GS_URL + '?action=get')
    .then(r => r.json())
    .then(data => {
      if (data.ok && data.products) {
        // Merge sheet data with seed (keep seed products not yet in sheet)
        const sheetSkus = new Set(data.products.map(p => p.sku));
        const missing = SEED_PRODUCTS.filter(p => !sheetSkus.has(p.sku));
        products = [...data.products, ...missing];
        showStatus('✓ ' + products.length + ' produk dimuat dari Google Sheets', 'ok');
      } else {
        products = [...SEED_PRODUCTS];
        showStatus('Data sheet kosong, menggunakan data default', 'ok');
      }
      buildFilters(); renderCatalog();
    })
    .catch(err => {
      console.error('GS load error:', err);
      // Fallback to localStorage
      try {
        const raw = localStorage.getItem('sec_era_products');
        products = raw ? JSON.parse(raw) : [...SEED_PRODUCTS];
      } catch(e) { products = [...SEED_PRODUCTS]; }
      showStatus('⚠ Gagal terhubung ke Sheets, pakai data lokal', 'error');
      buildFilters(); renderCatalog();
    });
}

function saveProducts() {
  // Always save to localStorage as backup
  try { localStorage.setItem('sec_era_products', JSON.stringify(products)); } catch(e) {}
  
  if (!GS_URL) return;
  
  showStatus('⏳ Menyimpan ke Google Sheets...', 'ok');
  // Use no-cors GET with encoded data (GAS CORS workaround)
  const payload = encodeURIComponent(JSON.stringify({ action: 'save', products: products }));
  fetch(GS_URL + '?method=POST&payload=' + payload)
  .then(r => r.json())
  .then(data => {
    if (data.ok) {
      showStatus('✓ Tersimpan ke Google Sheets (' + data.saved + ' produk)', 'ok');
    } else {
      showStatus('⚠ Error: ' + (data.error || 'Gagal simpan'), 'error');
    }
  })
  .catch(err => {
    showStatus('⚠ Gagal terhubung ke Sheets, tersimpan lokal saja', 'error');
  });
}

// ── TABS ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && tab==='catalog') || (i===1 && tab==='add'));
  });
  document.getElementById('panel-catalog').classList.toggle('active', tab==='catalog');
  document.getElementById('panel-add').classList.toggle('active', tab==='add');
  if(tab==='catalog') renderCatalog();
}

// ── FILTERS ──
function buildFilters() {
  const wrap = document.getElementById('filterBtns');
  if(!wrap) return;
  wrap.innerHTML = '';
  CATS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'filter-btn' + (c===activeFilter?' active':'');
    b.textContent = c;
    b.onclick = () => { activeFilter=c; buildFilters(); renderCatalog(); };
    wrap.appendChild(b);
  });
}

// ── RENDER CATALOG ──
function renderCatalog() {
  const grid = document.getElementById('catalogGrid');
  const count = document.getElementById('catalogCount');
  if(!grid) return;
  const filtered = activeFilter==='ALL' ? products : products.filter(p=>p.cat===activeFilter);
  if(count) count.textContent = filtered.length + ' produk';

  if(!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="icon">&#128722;</div>
      <h3>Belum ada produk</h3>
      <p>Klik "Tambah Produk" untuk mulai mengisi katalog</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <div class="product-card">
      <div class="card-img-wrap" onclick="openDetail('${p.id}')">
        ${p.mainImg ? `<img src="${p.mainImg}" alt="${p.name}">` : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:40px;">&#128247;</div>`}
        ${p.badge ? `<div class="card-badge ${p.badge}">${p.badge.replace('-',' ').toUpperCase()}</div>` : ''}
        ${p.badge==='coming-soon' ? `<div class="card-coming-overlay"><span>COMING SOON</span></div>` : ''}
        <div class="card-sku">${p.sku}</div>
      </div>
      <div class="card-body">
        <div class="card-category">${p.cat}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-price-row">
          <span class="card-price">Rp ${formatNum(p.price)}</span>
          ${p.priceOrig ? `<span class="card-price-orig">Rp ${formatNum(p.priceOrig)}</span>` : ''}
        </div>
        <div class="card-stock ${stockClass(p)}">${stockLabel(p)}</div>
        <div class="card-actions">
          ${p.shopee ? `<a href="${p.shopee}" target="_blank" class="card-shopee">&#128722; Beli di Shopee</a>` : '<span style="flex:1"></span>'}
          <button class="btn-edit" onclick="editProduct('${p.id}')">Edit</button>
          <button class="btn-danger" onclick="deleteProduct('${p.id}')">Del</button>
        </div>
      </div>
    </div>
  `).join('');
}

function stockClass(p) {
  if(p.status==='sold') return 'stock-out';
  if(p.status==='reserved') return 'stock-low';
  if(p.badge==='coming-soon') return 'stock-low';
  const s = parseInt(p.stock)||0;
  if(s===0) return 'stock-out';
  if(s<=2) return 'stock-low';
  return 'stock-in';
}
function stockLabel(p) {
  if(p.status==='sold') return '&#10007; Terjual';
  if(p.status==='reserved') return '&#9203; Reserved';
  if(p.badge==='coming-soon') return '&#128336; Coming Soon';
  const s = parseInt(p.stock)||0;
  if(s===0) return '&#10007; Habis';
  if(s<=2) return `&#9888; Stok ${s} (hampir habis)`;
  return `&#10003; Stok ${s}`;
}

// ── CLOUDINARY UPLOAD ──
function uploadToCloudinary(file, type, idx) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_PRESET);
  formData.append('folder', 'seconderaco');

  const statusMsg = type === 'main' ? 'foto utama' : 'foto ' + (idx+1);
  showStatus('⏳ Mengupload ' + statusMsg + ' ke cloud...', 'ok');

  fetch(CLOUDINARY_URL, { method: 'POST', body: formData })
    .then(r => r.json())
    .then(data => {
      if (data.secure_url) {
        if (type === 'main') {
          document.getElementById('mainImgPreview').src = data.secure_url;
          document.getElementById('mainImgPreview').dataset.cloudUrl = data.secure_url;
        } else {
          extraImgs[idx] = data.secure_url;
          const img = document.getElementById('extra-preview-'+idx);
          if(img) img.src = data.secure_url;
        }
        showStatus('✓ ' + statusMsg + ' tersimpan di cloud!', 'ok');
      } else {
        showStatus('⚠ Gagal upload foto ke cloud: ' + (data.error && data.error.message || 'Error'), 'error');
      }
    })
    .catch(err => {
      showStatus('⚠ Gagal upload foto, tersimpan lokal saja', 'error');
      console.error('Cloudinary error:', err);
    });
}

function handleMainImg(input) {
  const file = input.files[0];
  if(!file) return;
  // Show local preview immediately
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById('mainImgPreview');
    preview.src = e.target.result;
    preview.classList.add('visible');
    document.querySelector('#mainUploadArea .upload-icon').style.display='none';
    document.querySelector('#mainUploadArea .upload-text').style.display='none';
  };
  reader.readAsDataURL(file);
  // Upload to Cloudinary
  uploadToCloudinary(file, 'main', null);
}

function buildExtraGrid() {
  const grid = document.getElementById('extraImgGrid');
  grid.innerHTML = '';
  for(let i=0;i<7;i++) {
    const div = document.createElement('div');
    div.className = 'mini-upload';
    div.id = 'mini-'+i;
    div.innerHTML = `+
      <input type="file" accept="image/*" onchange="handleExtraImg(this,${i})">
      <img id="extra-preview-${i}">
      <button class="mini-del" id="extra-del-${i}" onclick="removeExtra(${i})">&#10005;</button>`;
    grid.appendChild(div);
  }
}

function handleExtraImg(input, idx) {
  const file = input.files[0];
  if(!file) return;
  // Show local preview immediately
  const reader = new FileReader();
  reader.onload = e => {
    extraImgs[idx] = e.target.result;
    const img = document.getElementById('extra-preview-'+idx);
    img.src = e.target.result;
    img.classList.add('visible');
    document.getElementById('extra-del-'+idx).classList.add('visible');
    document.querySelector('#mini-'+idx).firstChild.textContent = '';
  };
  reader.readAsDataURL(file);
  // Upload to Cloudinary
  uploadToCloudinary(file, 'extra', idx);
}

function removeExtra(idx) {
  extraImgs[idx] = null;
  const img = document.getElementById('extra-preview-'+idx);
  img.src=''; img.classList.remove('visible');
  document.getElementById('extra-del-'+idx).classList.remove('visible');
  document.querySelector('#mini-'+idx).firstChild.textContent = '+';
}

// ── FORMAT ──
function formatPrice(inp) {
  let v = inp.value.replace(/[^0-9]/g,'');
  inp.value = v;
}
function formatNum(n) {
  return Number(n).toLocaleString('id-ID');
}

// ── SKU AUTO ──
function genSku(cat) {
  const prefix = {
    OUTERWEAR:'SEC-OW',DENIM:'SEC-DN',TOPS:'SEC-TP',
    ACCESSORIES:'SEC-AC',FOOTWEAR:'SEC-FW',SCENT:'SEC-SC',LAINNYA:'SEC-XX'
  }[cat] || 'SEC-XX';
  const num = String(products.filter(p=>p.cat===cat).length+1).padStart(3,'0');
  return `${prefix}-${num}`;
}

// Event to auto-fill SKU
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('prodCat').addEventListener('change', function() {
    const skuField = document.getElementById('prodSku');
    if(!skuField.value || skuField.value.startsWith('SEC-')) {
      skuField.value = genSku(this.value);
    }
  });
});

// ── SAVE ──
function saveProduct() {
  const name = document.getElementById('prodName').value.trim();
  const sku = document.getElementById('prodSku').value.trim();
  const cat = document.getElementById('prodCat').value;
  const desc = document.getElementById('prodDesc').value.trim();
  const price = document.getElementById('prodPrice').value.trim();
  const shopee = document.getElementById('prodShopee').value.trim();
  const mainImg = document.getElementById('mainImgPreview').src;
  const hasImg = document.getElementById('mainImgPreview').classList.contains('visible');

  if(!name||!sku||!cat||!desc||!price||!shopee) {
    showToast('Lengkapi semua field wajib (*)','error'); return;
  }

  const editId = document.getElementById('editId').value;
  const prod = {
    id: editId || Date.now().toString(),
    name, sku, cat, desc, price,
    priceOrig: document.getElementById('prodPriceOrig').value.trim(),
    stock: document.getElementById('prodStock').value.trim() || '1',
    size: document.getElementById('prodSize').value.trim(),
    weight: document.getElementById('prodWeight').value.trim(),
    brand: document.getElementById('prodBrand').value.trim(),
    material: document.getElementById('prodMaterial').value.trim(),
    color: document.getElementById('prodColor').value.trim(),
    status: document.getElementById('prodStatus').value,
    badge: document.getElementById('prodBadge').value,
    shopee,
    notes: document.getElementById('prodNotes').value.trim(),
    condition: document.getElementById('prodCondition').value,
    panjang: document.getElementById('prodPanjang').value.trim(),
    lebar: document.getElementById('prodLebar').value.trim(),
    tinggi: document.getElementById('prodTinggi').value.trim(),
    mainImg: hasImg ? (document.getElementById('mainImgPreview').dataset.cloudUrl || mainImg) : null,
    extraImgs: [...extraImgs],
    createdAt: editId ? (products.find(p=>p.id===editId)||{}).createdAt : new Date().toLocaleDateString('id-ID'),
  };

  if(editId) {
    const idx = products.findIndex(p=>p.id===editId);
    if(idx>=0) products[idx]=prod;
  } else {
    products.unshift(prod);
  }

  saveProducts();
  resetForm();
  showToast('Produk berhasil disimpan!','success');
  switchTab('catalog');
}

// ── EDIT ──
function editProduct(id) {
  const p = products.find(x=>x.id===id);
  if(!p) return;
  switchTab('add');
  document.getElementById('editId').value = p.id;
  document.getElementById('prodName').value = p.name;
  document.getElementById('prodSku').value = p.sku;
  document.getElementById('prodCat').value = p.cat;
  document.getElementById('prodDesc').value = p.desc;
  document.getElementById('prodPrice').value = p.price;
  document.getElementById('prodPriceOrig').value = p.priceOrig||'';
  document.getElementById('prodStock').value = p.stock||'';
  document.getElementById('prodSize').value = p.size||'';
  document.getElementById('prodWeight').value = p.weight||'';
  document.getElementById('prodBrand').value = p.brand||'';
  document.getElementById('prodMaterial').value = p.material||'';
  document.getElementById('prodColor').value = p.color||'';
  document.getElementById('prodStatus').value = p.status||'available';
  document.getElementById('prodBadge').value = p.badge||'';
  document.getElementById('prodShopee').value = p.shopee||'';
  document.getElementById('prodNotes').value = p.notes||'';
  document.getElementById('prodCondition').value = p.condition||'Baru';
  document.getElementById('prodPanjang').value = p.panjang||'';
  document.getElementById('prodLebar').value = p.lebar||'';
  document.getElementById('prodTinggi').value = p.tinggi||'';

  if(p.mainImg) {
    const prev = document.getElementById('mainImgPreview');
    prev.src = p.mainImg; prev.classList.add('visible');
    document.querySelector('#mainUploadArea .upload-icon').style.display='none';
    document.querySelector('#mainUploadArea .upload-text').style.display='none';
  }

  extraImgs = p.extraImgs ? [...p.extraImgs] : [null,null,null,null,null,null,null];
  // Pad to 7 if shorter
  while(extraImgs.length < 7) extraImgs.push(null);
  for(let i=0;i<7;i++) {
    if(extraImgs[i]) {
      const img = document.getElementById('extra-preview-'+i);
      if(img) { img.src=extraImgs[i]; img.classList.add('visible'); }
      const del = document.getElementById('extra-del-'+i);
      if(del) del.classList.add('visible');
    }
  }
}

// ── DELETE ──
function deleteProduct(id) {
  if(!confirm('Hapus produk ini?')) return;
  products = products.filter(p=>p.id!==id);
  saveProducts();
  renderCatalog();
  buildFilters();
  showToast('Produk dihapus','error');
}

function resetForm() {
  document.getElementById('editId').value='';
  ['prodName','prodSku','prodCat','prodDesc','prodPrice','prodPriceOrig',
   'prodStock','prodSize','prodWeight','prodBrand','prodMaterial','prodColor',
   'prodShopee','prodNotes','prodPanjang','prodLebar','prodTinggi'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.value='';
  });
  document.getElementById('prodStatus').value='available';
  document.getElementById('prodBadge').value='';
  document.getElementById('prodCondition').value='Baru';
  const prev = document.getElementById('mainImgPreview');
  prev.src=''; prev.classList.remove('visible');
  document.querySelector('#mainUploadArea .upload-icon').style.display='';
  document.querySelector('#mainUploadArea .upload-text').style.display='';
  document.getElementById('mainImg').value='';
  extraImgs=[null,null,null,null,null,null,null];
  buildExtraGrid();
}

// ── DETAIL MODAL ──
function openDetail(id) {
  const p = products.find(x=>x.id===id);
  if(!p) return;
  const allImgs = [p.mainImg, ...(p.extraImgs||[])].filter(Boolean);

  document.getElementById('modalBody').innerHTML = `
    <div class="detail-grid">
      <div class="detail-imgs">
        <div class="detail-main-img" id="detailMainImg">
          ${allImgs.length ? `<img id="detailBigImg" src="${allImgs[0]}" alt="${p.name}">` : '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:60px;">&#128247;</div>'}
        </div>
        ${allImgs.length>1 ? `<div class="detail-thumbs">${allImgs.map((img,i)=>`
          <div class="thumb${i===0?' active':''}" onclick="switchImg('${img}',this)">
            <img src="${img}" alt="foto ${i+1}">
          </div>`).join('')}</div>` : ''}
      </div>
      <div class="detail-info">
        <div class="detail-cat">${p.cat}</div>
        <div class="detail-name">${p.name}</div>
        <div class="detail-sku">SKU: ${p.sku} &bull; ${p.createdAt||''}</div>
        ${p.badge ? `<div class="card-badge ${p.badge}">${p.badge.toUpperCase()}</div>` : ''}
        <div class="cond-badge">${p.condition||'Baru'}</div>
        <div class="detail-price">Rp ${formatNum(p.price)}</div>
        ${p.priceOrig ? `<div class="detail-price-orig">Rp ${formatNum(p.priceOrig)}</div>` : ''}
        <hr class="detail-divider">
        <div class="detail-label">Deskripsi</div>
        <div class="detail-desc">${p.desc}</div>
        <div class="detail-meta">
          ${p.size?`<div class="meta-item"><div class="detail-label">Ukuran</div><div class="meta-val">${p.size}</div></div>`:''}          ${p.color?`<div class="meta-item"><div class="detail-label">Warna</div><div class="meta-val">${p.color}</div></div>`:''}          ${p.material?`<div class="meta-item"><div class="detail-label">Material</div><div class="meta-val">${p.material}</div></div>`:''}          ${p.brand?`<div class="meta-item"><div class="detail-label">Brand Asal</div><div class="meta-val">${p.brand}</div></div>`:''}          ${p.weight?`<div class="meta-item"><div class="detail-label">Berat</div><div class="meta-val">${p.weight} gram</div></div>`:''}          ${(p.panjang||p.lebar||p.tinggi)?`<div class="meta-item"><div class="detail-label">Dimensi</div><div class="meta-val">${p.panjang||'-'} × ${p.lebar||'-'} × ${p.tinggi||'-'} cm</div></div>`:''}          <div class="meta-item"><div class="detail-label">Status</div><div class="meta-val ${stockClass(p)}">${stockLabel(p)}</div></div>
        </div>
        ${p.notes?`<hr class="detail-divider"><div class="detail-label">Catatan Seller</div><div class="detail-desc" style="font-size:12px;">${p.notes}</div>`:''}
        <hr class="detail-divider">
        ${p.shopee?`<a href="${p.shopee}" target="_blank" class="detail-shopee">&#128722; Beli Sekarang di Shopee</a>`:''}
        <div style="display:flex;gap:8px;">
          <button class="btn-edit" style="flex:1" onclick="closeModal();editProduct('${p.id}')">Edit Produk</button>
          <button class="btn-danger" onclick="closeModal();deleteProduct('${p.id}')">Hapus</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('detailModal').classList.add('open');
}

function switchImg(src, el) {
  document.getElementById('detailBigImg').src = src;
  document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('open');
}

document.getElementById('detailModal').addEventListener('click', function(e) {
  if(e.target===this) closeModal();
});

// ── TOAST ──
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(()=>t.className='toast',3000);
}

// Auto-fill SKU on category change
document.getElementById('prodCat').addEventListener('change', function() {
  const skuField = document.getElementById('prodSku');
  const editId = document.getElementById('editId').value;
  if(!editId && (!skuField.value || skuField.value.startsWith('SEC-'))) {
    skuField.value = genSku(this.value);
  }
});
</script>
</body>
</html>
